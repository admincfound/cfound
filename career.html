<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career Page Source</title>

  <style>body { display: none; }</style>
  
  <!-- JSON-LD will be injected by the API -->
  <script type="application/ld+json" id="job-jsonld">{}</script>
</head>
<body>
<div id="job-container"></div>

<script>
  // Get the slug from the URL
  const slug = location.pathname.split('/').pop();

  // Fetch the job HTML from your server API and inject
  fetch(`/api/job/${slug}`)
    .then(res => res.text())
    .then(html => {
      document.getElementById('job-container').innerHTML = html;
    });
</script>
</body>
</html>
