<body>

<div id="job-container"></div>

<script>

(async () => {

  const slug =
    location.pathname
      .split("/")
      .pop();

  const id =
    slug
      .split("-")
      .slice(-1)[0];

  console.log("SLUG:", slug);
  console.log("ID:", id);

  try {

    const response =
      await fetch(`/api/job/${slug}`);

    const html =
      await response.text();

    document.open();
    document.write(html);
    document.close();

  } catch (error) {

    console.error(error);

  }

})();

</script>

</body>
</html>
