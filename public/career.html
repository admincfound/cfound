<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career</title>
</head>
<body>

<script>

(async () => {

  const slug =
    location.pathname
      .split("/")
      .pop();

  const response =
    await fetch(`/api/job/${slug}`);

  const html =
    await response.text();

  document.open();
  document.write(html);
  document.close();

})();

</script>

</body>
</html>
